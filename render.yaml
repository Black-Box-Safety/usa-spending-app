services:
  - type: web
    name: bbs-spending-search
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SAM_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: NODE_VERSION
        value: "20"
